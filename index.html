<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group 3 | Cloud Architecture</title>
    <style>
        /* Modern, Minimalist CSS Architecture */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fafafa; 
            color: #111827; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        
        .container { 
            max-width: 800px; 
            padding: 40px; 
            text-align: center; 
        }
        
        .badge { 
            display: inline-block; 
            padding: 8px 16px; 
            background-color: #f3f4f6; 
            border-radius: 9999px; 
            font-size: 0.75rem; 
            font-weight: 600; 
            letter-spacing: 0.1em; 
            text-transform: uppercase; 
            margin-bottom: 24px; 
            color: #4b5563; 
            border: 1px solid #e5e7eb;
        }
        
        h1 { 
            font-size: 3.5rem; 
            font-weight: 300; 
            letter-spacing: -0.03em; 
            margin-bottom: 16px; 
        }
        
        h1 span { 
            font-weight: 600; 
        }
        
        p { 
            font-size: 1.125rem; 
            color: #6b7280; 
            line-height: 1.6; 
            margin-bottom: 48px; 
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .image-card { 
            background: #ffffff; 
            border: 1px solid #f3f4f6; 
            border-radius: 16px; 
            padding: 16px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025); 
            transition: transform 0.4s ease, box-shadow 0.4s ease; 
        }
        
        .image-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }
        
        .image-card img { 
            max-width: 100%; 
            border-radius: 12px; 
            height: auto; 
            background-color: #f9fafb;
        }
        
        .s3-caption {
            margin-top: 16px; 
            font-size: 0.875rem; 
            color: #9ca3af; 
            font-weight: 400;
        }
        
        .footer-info { 
            margin-top: 48px; 
            font-size: 0.875rem; 
            color: #d1d5db; 
        }
        
        .server-status { 
            display: inline-flex; 
            align-items: center; 
            margin-top: 32px; 
            padding: 8px 20px; 
            background: #ffffff;
            border: 1px solid #e5e7eb; 
            border-radius: 12px;
            font-size: 0.875rem;
            color: #374151;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        
        .dot { 
            width: 8px; 
            height: 8px; 
            background-color: #10b981; 
            border-radius: 50%; 
            margin-right: 12px; 
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.8); 
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">End-to-End Cloud Solution</div>
        
        <h1>Group 3 <span>Architecture</span></h1>
        
        <p>Seamlessly routed by an Application Load Balancer, secured via CloudFront edge locations, and deployed with high availability.</p>

        </div>

        <div class="server-status">
            <div class="dot" id="status-dot" style="background-color: #d1d5db; box-shadow: none;"></div>
            <span id="server-id">Establishing connection...</span>
        </div>

        <div class="footer-info">
            Developed by Group 3 • CI/CD Automated
        </div>
    </div>

    <script>
        // JavaScript logic to simulate health check rendering
        document.addEventListener('DOMContentLoaded', () => {
            const statusText = document.getElementById('server-id');
            const statusDot = document.getElementById('status-dot');
            
            setTimeout(() => {
                statusText.innerText = "Target Healthy • ALB Routing Active";
                statusDot.style.backgroundColor = "#10b981";
                statusDot.style.boxShadow = "0 0 12px rgba(16, 185, 129, 0.8)";
            }, 1200);
        });
    </script>
</body>
</html>
