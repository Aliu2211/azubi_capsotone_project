name: Production Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Auto Scaling Fleet
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Execute Deployment via SSM
      run: |
        COMMAND_ID=$(aws ssm send-command --region us-east-1 --document-name "AWS-RunShellScript" --targets "Key=tag:aws:autoscaling:groupName,Values=Capstone-ASG" --parameters '{"commands":["cd /var/www/html","git pull origin main","chown -R apache:apache /var/www/html","systemctl restart httpd"]}' --comment "Automated CI/CD Deployment" --query "Command.CommandId" --output text)
        echo "Command ID: $COMMAND_ID"
        sleep 15
        aws ssm list-command-invocations --region us-east-1 --command-id $COMMAND_ID --details --query "CommandInvocations[*].[InstanceId,Status,CommandPlugins[0].Output]" --output table